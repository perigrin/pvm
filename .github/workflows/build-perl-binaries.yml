# ABOUTME: GitHub Actions workflow for building Perl binaries across multiple platforms
# ABOUTME: Uses pvm build-perl --upload command with platform matrix

name: Build Perl Binaries

on:
  # Manual trigger only
  workflow_dispatch:
    inputs:
      perl_versions:
        description: 'Perl versions to build (comma-separated or "latest2" for most recent 2 versions)'
        required: false
        default: 'latest2'
        type: string

jobs:
  # Get latest Perl versions and prepare matrix
  prepare:
    name: Prepare Build Matrix
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.versions.outputs.versions }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Download latest PVM release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Download the linux-amd64 release asset
          gh release download --repo ${{ github.repository }} --pattern "*linux-amd64.tar.gz"

          # Extract and make executable
          tar -xzf pvm-*-linux-amd64.tar.gz
          chmod +x pvm-*

          # Create symlink for easy access
          ln -s pvm-* pvm

          # Verify it works
          ./pvm version

      - name: Get Perl versions
        id: versions
        run: |
          if [[ "${{ github.event.inputs.perl_versions }}" == "latest2" ]]; then
            # Get the 2 most recent stable versions
            VERSIONS=$(./pvm available --format=json | jq -r '.stable | keys | sort_by(.) | reverse | .[0:2] | @csv' | tr -d '"')
          else
            VERSIONS="${{ github.event.inputs.perl_versions }}"
          fi
          echo "versions=$VERSIONS" >> $GITHUB_OUTPUT
          echo "Selected Perl versions: $VERSIONS"

      - name: Generate build matrix
        id: matrix
        run: |
          # Convert comma-separated versions to JSON array
          VERSIONS_JSON=$(echo "${{ steps.versions.outputs.versions }}" | jq -R 'split(",") | map(select(length > 0))')

          # Platform matrix (same as release workflow)
          PLATFORMS='["linux-amd64", "darwin-amd64", "darwin-arm64"]'

          MATRIX=$(jq -n --argjson versions "$VERSIONS_JSON" --argjson platforms "$PLATFORMS" '{
            include: [
              $versions[] as $version | $platforms[] as $platform | {
                version: $version,
                platform: $platform,
                runner: (
                  if $platform == "linux-amd64" then "ubuntu-latest"
                  elif $platform == "darwin-amd64" then "macos-13"
                  elif $platform == "darwin-arm64" then "macos-latest"
                  else "ubuntu-latest" end
                )
              }
            ]
          }')

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Generated matrix:"
          echo "$MATRIX" | jq .

  # Build binaries using pvm build-perl --upload
  build:
    name: Build ${{ matrix.version }} on ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Download latest PVM release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Download the release asset for the current platform
          gh release download --repo ${{ github.repository }} --pattern "*${{ matrix.platform }}.tar.gz"

          # Extract and make executable
          tar -xzf pvm-*-${{ matrix.platform }}.tar.gz
          chmod +x pvm-*

          # Create symlink for easy access
          ln -s pvm-* pvm

          # Verify it works
          ./pvm version

      - name: Build and upload Perl binary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./pvm build-perl ${{ matrix.version }} --upload \
            --platforms ${{ matrix.platform }} \
            --github-repo ${{ github.repository }} \
            --github-token "$GITHUB_TOKEN"
        timeout-minutes: 120

  # Summary job
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: always()
    steps:
      - name: Build Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Perl Versions**: ${{ needs.prepare.outputs.versions }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build Status**: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.build.result }}" == "success" ]]; then
            echo "✅ All binaries built and uploaded successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some builds failed - check individual job logs" >> $GITHUB_STEP_SUMMARY
          fi
