# ABOUTME: Simple CI pipeline following the standard build workflow
# ABOUTME: Runs make && make test and reports results

name: CI

on:
  push:
    branches: [ pu ]
  pull_request:
    branches: [ pu ]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.4'

    - name: Set up Node.js (for tree-sitter)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential
        npm install -g tree-sitter-cli

    - name: Build
      run: make

    - name: Test
      run: make test

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: build/
        retention-days: 7

  cross-platform-test:
    name: Cross-Platform Test (macOS)
    if: github.event_name == 'pull_request'
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.4'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        npm install -g tree-sitter-cli
        xcode-select --install 2>/dev/null || true

    - name: Build
      run: make

    - name: Test
      run: make test
