# ABOUTME: CI pipeline testing Linux, macOS, and Windows
# ABOUTME: Pure Go build — no CGO, no tree-sitter CLI, no Node.js required

name: CI

on:
  push:
    branches: [ pu ]
  pull_request:
    branches: [ pu ]

jobs:
  test:
    name: Test & Build (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: Linux
            runner: ubuntu-latest
          - os: macOS
            runner: macos-latest
          - os: Windows
            runner: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.4'

    - name: Build
      run: go build ./...

    - name: Test
      run: go test ./... -count=1

  smoke-test:
    name: Smoke Test (bash, zsh, fish)
    runs-on: ubuntu-latest
    needs: test
    env:
      # Gate the two-version binary-install section off in CI until the
      # release artifacts ship signed SHA256 manifests. Issue tracked
      # separately. Journeys fall through to the single-version fallback.
      PVM_SMOKE_SKIP_BINARY_INSTALL: "1"
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.4'

    - name: Run smoke-test suite
      run: ./test/docker/smoke-test/run-smoke.sh
