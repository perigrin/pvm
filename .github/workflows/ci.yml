# ABOUTME: Simple CI pipeline following the standard build workflow
# ABOUTME: Runs make && make test and reports results

name: CI

on:
  push:
    branches: [ pu ]
  pull_request:
    branches: [ pu ]

jobs:
  test:
    name: Test & Build
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.4'

    - name: Set up Node.js (for tree-sitter)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install system dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential
        npm install -g tree-sitter-cli

    - name: Install system dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        npm install -g tree-sitter-cli

    - name: Install system dependencies (Windows)
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        npm install -g tree-sitter-cli
        # Use GitHub Actions' pre-installed MSYS2
        echo "C:/msys64/mingw64/bin" >> $GITHUB_PATH
        echo "C:/msys64/usr/bin" >> $GITHUB_PATH

    - name: Build
      run: make

    - name: Test
      run: make test

    - name: Test purego bindings cross-compilation
      if: matrix.os == 'ubuntu-latest'
      run: |
        echo "Testing cross-compilation of purego bindings..."
        GOOS=windows GOARCH=amd64 go build -C tree-sitter-typed-perl/bindings/go
        GOOS=darwin GOARCH=amd64 go build -C tree-sitter-typed-perl/bindings/go
        GOOS=linux GOARCH=amd64 go build -C tree-sitter-typed-perl/bindings/go

    - name: Build cross-platform PVM binaries
      if: matrix.os == 'ubuntu-latest'
      run: |
        echo "Building cross-platform PVM binaries..."
        mkdir -p build/cross-platform
        GOOS=windows GOARCH=amd64 go build -o build/cross-platform/pvm-windows-amd64.exe ./cmd/pvm || echo "Windows cross-compilation failed (expected due to CGO)"
        GOOS=darwin GOARCH=amd64 go build -o build/cross-platform/pvm-darwin-amd64 ./cmd/pvm || echo "macOS cross-compilation failed (expected due to CGO)"
        echo "Cross-compilation results logged (purego bindings work, full PVM needs CGO resolution)"

    - name: Test cross-compiled binary execution
      if: matrix.os == 'windows-latest'
      run: |
        echo "Testing that native Windows build works with purego bindings..."
        ./build/pvm version
        echo "Verifying tree-sitter integration works..."
        ./build/psc --help

    - name: Smoke test purego tree-sitter integration
      run: |
        echo "Testing purego tree-sitter integration on ${{ matrix.os }}..."
        go test -C tree-sitter-typed-perl/bindings/go -v -run TestLanguageBinding
        echo "Purego integration working correctly on ${{ matrix.os }}"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-${{ matrix.os }}
        path: build/
        retention-days: 7
