# ABOUTME: Multi-job CI pipeline with proper cross-compilation testing
# ABOUTME: Tests Linux/macOS natively, cross-compiles for Windows, tests on Windows

name: CI

on:
  push:
    branches: [ pu ]
  pull_request:
    branches: [ pu ]

jobs:
  test-linux:
    name: Test & Build (Linux)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.4'

    - name: Set up Node.js (for tree-sitter)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential
        npm install -g tree-sitter-cli

    - name: Build
      run: make

    - name: Test
      env:
        # Skip integration tests to avoid GitHub API rate limiting
        PVM_TEST_MODE: unit
      run: make test

    # Note: Windows cross-compilation disabled due to CGO dependencies
    # CGO tree-sitter bindings cannot cross-compile to Windows from Linux
    # See issue #38 for Windows support progress

    - name: Upload Linux build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-linux
        path: build/
        retention-days: 7

  test-macos:
    name: Test & Build (macOS)
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.4'

    - name: Set up Node.js (for tree-sitter)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install system dependencies
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        npm install -g tree-sitter-cli

        # Use existing PVM release to install pre-compiled Perl
        echo "Installing PVM to manage Perl versions..."
        # Get the latest PVM release tag dynamically
        LATEST_PVM=$(gh release list --repo perigrin/pvm --limit 1 --json tagName --jq '.[0].tagName')
        echo "Using PVM release: $LATEST_PVM"
        gh release download "$LATEST_PVM" --pattern "pvm-*-darwin-arm64.tar.gz" --repo perigrin/pvm
        tar -xzf pvm-*-darwin-arm64.tar.gz
        sudo mv pvm-darwin-arm64 /usr/local/bin/pvm

        # Install latest Perl using binary distribution (RC26+ has GH_TOKEN support)
        # Use 5.42.0 directly since it has binaries and parsing is broken (Issue #73)
        LATEST_PERL="5.42.0"
        echo "Using Perl $LATEST_PERL (latest with binaries available)"
        pvm install --prefer-binary "$LATEST_PERL"

        # Initialize PVM shell integration and use latest Perl
        eval "$(pvm init)"
        pvm use "$LATEST_PERL"

        # Ensure PVM-managed perl is in PATH
        echo "$HOME/.local/share/pvm/versions/$LATEST_PERL/bin" >> $GITHUB_PATH

    - name: Build
      run: make

    - name: Test
      env:
        # Skip integration tests to avoid GitHub API rate limiting
        PVM_TEST_MODE: unit
      run: |
        echo "=== Debugging Perl Environment ==="
        # Fix PATH to include PVM binary and PVM-managed Perl
        export PATH="/usr/local/bin:$HOME/.local/share/pvm/versions/5.42.0/bin:$PATH"
        echo "PATH: $PATH"
        echo "which pvm: $(which pvm || echo 'not found')"
        echo "which perl: $(which perl || echo 'not found')"
        echo "perl version: $(perl --version 2>/dev/null || echo 'perl not accessible')"
        echo "PVM current: $(pvm current 2>/dev/null || echo 'pvm not accessible')"
        echo "Direct Perl test: $($HOME/.local/share/pvm/versions/5.42.0/bin/perl --version 2>/dev/null || echo 'direct path failed')"
        echo "=== Re-initializing PVM Environment ==="
        eval "$(pvm init)"
        pvm use 5.42.0
        echo "After PVM init - which perl: $(which perl)"
        echo "=== Running Tests ==="
        make test

    - name: Upload macOS build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-macos
        path: build/
        retention-days: 7

  # test-windows job removed - no Windows cross-compilation with CGO
  # Windows support is tracked in issue #38
