name: Cross-Platform Tests

on:
  push:
    branches: [ main, pu, develop ]
  pull_request:
    branches: [ main, pu ]
  workflow_call:

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            shell: bash
          - os: windows-latest
            shell: bash
          - os: macos-latest
            shell: bash

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24.1'

    - name: Set up Node.js (for tree-sitter)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install tree-sitter CLI
      run: npm install -g tree-sitter-cli

    - name: Install system dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential

    - name: Install system dependencies (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        choco install msys2 -y
        echo "C:/tools/msys64/mingw64/bin" >> $GITHUB_PATH

    - name: Install system dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        # Xcode command line tools should already be available
        xcode-select --install 2>/dev/null || true

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Build tree-sitter parser
      run: |
        if [[ "${{ runner.os }}" == "Windows" ]]; then
          echo "⚠️ Tree-sitter build not supported on Windows, skipping PSC build"
          echo "SKIP_PSC_BUILD=true" >> $GITHUB_ENV
        else
          make tree-sitter
        fi

    - name: Download Go dependencies
      run: go mod download

    - name: Install development tools
      run: make install-tools

    - name: Verify code generation is up to date
      run: make check-generate

    - name: Set CGO environment
      run: |
        echo "CGO_ENABLED=1" >> $GITHUB_ENV

    - name: Build all components
      run: |
        echo "Building PVM components..."
        make pvm
        make pvx
        make pvi
        if [[ "$SKIP_PSC_BUILD" != "true" ]]; then
          make psc
        else
          echo "⚠️ Skipping PSC build on Windows (tree-sitter not supported)"
        fi

    - name: Verify builds
      run: |
        echo "Testing built binaries..."
        ./build/pvm version
        ./build/pvx version
        ./build/pvi version
        if [[ "$SKIP_PSC_BUILD" != "true" ]]; then
          ./build/psc version
        else
          echo "⚠️ Skipping PSC verification (not built on Windows)"
        fi

    - name: Run baseline tests
      run: make test-baselines

    - name: Run unit tests with coverage
      run: |
        echo "Running tests with coverage..."
        make test-coverage

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest'
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.out
        fail_ci_if_error: false
        verbose: true

    - name: Run PSC-specific tests
      run: |
        if [[ "$SKIP_PSC_BUILD" != "true" ]]; then
          echo "Running PSC tests..."
          go test -mod=mod -v ./internal/psc
        else
          echo "⚠️ Skipping PSC tests (not supported on Windows)"
        fi

    - name: Run basic e2e tests
      run: |
        echo "Running basic e2e tests..."
        if [[ "$SKIP_PSC_BUILD" != "true" ]]; then
          go test -mod=mod -timeout=60s -v ./test/e2e -run="TestVersionCommand|TestPSCCheck"
        else
          go test -mod=mod -timeout=60s -v ./test/e2e -run="TestVersionCommand"
        fi

    - name: Run performance benchmarks
      if: matrix.os == 'ubuntu-latest'
      run: |
        echo "Running performance benchmarks..."
        make test-performance-baseline

    - name: Security scan
      if: matrix.os == 'ubuntu-latest'
      run: |
        echo "Running security scan..."
        go install golang.org/x/vuln/cmd/govulncheck@latest
        govulncheck ./...

    - name: Test PSC functionality
      run: |
        if [[ "$SKIP_PSC_BUILD" != "true" ]]; then
          echo "Testing PSC with real typed Perl code..."
          echo 'my Int $x = 42; my Str $name = "test";' > test.pl
          ./build/psc check test.pl
          echo "PSC test passed!"
        else
          echo "⚠️ Skipping PSC functionality test (not supported on Windows)"
        fi

    - name: Collect test artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}
        path: |
          coverage.out
          coverage.html
          .build-metrics/
          test/e2e/test_output_file.txt
        retention-days: 30

    - name: Collect performance artifacts
      if: matrix.os == 'ubuntu-latest' && always()
      uses: actions/upload-artifact@v4
      with:
        name: performance-results
        path: |
          testdata/performance/
          .build-metrics/
        retention-days: 90

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24.1'

    - name: Set up Node.js (for tree-sitter)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install tree-sitter CLI and build dependencies
      run: |
        npm install -g tree-sitter-cli
        sudo apt-get update
        sudo apt-get install -y build-essential

    - name: Build tree-sitter parser
      run: make tree-sitter

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v3
      with:
        version: latest
        args: --timeout=10m

    - name: Check pre-commit hooks
      run: |
        pip install pre-commit
        pre-commit run --all-files
