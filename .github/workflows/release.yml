# ABOUTME: Automated cross-platform release workflow for PVM
# ABOUTME: Uses Makefile targets to build and package releases

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v1.0.0-rc2)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  build-matrix:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - platform: linux-arm64
            runner: ubuntu-latest
            goos: linux
            goarch: arm64
          - platform: darwin-amd64
            runner: macos-latest
            goos: darwin
            goarch: amd64
          - platform: darwin-arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.4'

    - name: Set up Node.js (for tree-sitter)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install system dependencies (Linux)
      if: matrix.runner == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential
        if [ "${{ matrix.goarch }}" == "arm64" ]; then
          sudo apt-get install -y gcc-aarch64-linux-gnu
        fi
        npm install -g tree-sitter-cli

    - name: Install system dependencies (macOS)
      if: matrix.runner == 'macos-latest'
      run: |
        npm install -g tree-sitter-cli
        xcode-select --install 2>/dev/null || true

    - name: Get version info
      id: version
      shell: bash
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          TAG="${{ github.event.inputs.tag }}"
          PRERELEASE="${{ github.event.inputs.prerelease }}"
        else
          TAG=${GITHUB_REF#refs/tags/}
          # Auto-detect prerelease based on tag
          if [[ "$TAG" =~ -rc[0-9]+$ ]] || [[ "$TAG" =~ -alpha[0-9]*$ ]] || [[ "$TAG" =~ -beta[0-9]*$ ]]; then
            PRERELEASE="true"
          else
            PRERELEASE="false"
          fi
        fi
        VERSION=${TAG#v}
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT

    - name: Build tree-sitter
      run: make tree-sitter

    - name: Build binary
      env:
        VERSION: ${{ steps.version.outputs.version }}
        BUILD_TIME: ${{ steps.version.outputs.build_time }}
        COMMIT: ${{ github.sha }}
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: |
        mkdir -p build/release
        LDFLAGS="-s -w -X 'tamarou.com/pvm/internal/version.Version=${VERSION}' -X 'tamarou.com/pvm/internal/version.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)' -X 'tamarou.com/pvm/internal/version.CommitHash=${COMMIT}'"

        if [ "${{ matrix.goarch }}" == "arm64" ] && [ "${{ matrix.goos }}" == "linux" ]; then
          CC=aarch64-linux-gnu-gcc go build -ldflags="$LDFLAGS" -o build/release/pvm-${{ matrix.platform }} ./cmd/pvm
        else
          go build -ldflags="$LDFLAGS" -o build/release/pvm-${{ matrix.platform }} ./cmd/pvm
        fi

    - name: Test binary
      run: |
        echo "Testing ${{ matrix.platform }} binary..."
        ./build/release/pvm-${{ matrix.platform }} version

    - name: Create archive
      run: |
        cd build/release
        tar -czf pvm-${{ steps.version.outputs.version }}-${{ matrix.platform }}.tar.gz pvm-${{ matrix.platform }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: pvm-${{ matrix.platform }}
        path: build/release/pvm-${{ steps.version.outputs.version }}-${{ matrix.platform }}.tar.gz
        retention-days: 7

  create-release:
    name: Create GitHub Release
    needs: build-matrix
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Get version info
      id: version
      shell: bash
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          TAG="${{ github.event.inputs.tag }}"
          PRERELEASE="${{ github.event.inputs.prerelease }}"
        else
          TAG=${GITHUB_REF#refs/tags/}
          # Auto-detect prerelease based on tag
          if [[ "$TAG" =~ -rc[0-9]+$ ]] || [[ "$TAG" =~ -alpha[0-9]*$ ]] || [[ "$TAG" =~ -beta[0-9]*$ ]]; then
            PRERELEASE="true"
          else
            PRERELEASE="false"
          fi
        fi
        VERSION=${TAG#v}
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT

    - name: Organize release files
      run: |
        mkdir -p release-files
        find artifacts -name "*.tar.gz" | while read file; do
          cp "$file" release-files/
        done
        ls -la release-files/

    - name: Generate release notes
      id: release_notes
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        TAG="${{ steps.version.outputs.tag }}"

        # Get previous tag for changelog
        PREV_TAG=$(git tag --sort=-version:refname | grep -v "$TAG" | head -n1 || echo "")

        cat > release_notes.md << EOF
        # PVM $TAG

        ## 🚀 What's New

        $(if [ -n "$PREV_TAG" ]; then
          echo "### Changes since $PREV_TAG"
          git log --pretty=format:"- %s" "$PREV_TAG..$TAG" | head -20
        else
          echo "First release of PVM (Perl Version Manager) with comprehensive typed Perl support."
        fi)

        ## 📦 Release Assets

        This release includes binaries for multiple platforms:

        ### Linux
        - **Linux AMD64**: \`pvm-${VERSION}-linux-amd64.tar.gz\` (includes PSC with tree-sitter)
        - **Linux ARM64**: \`pvm-${VERSION}-linux-arm64.tar.gz\` (PVM, PVI, PVX only)

        ### macOS
        - **macOS Intel**: \`pvm-${VERSION}-darwin-amd64.tar.gz\` (includes PSC)
        - **macOS Apple Silicon**: \`pvm-${VERSION}-darwin-arm64.tar.gz\` (includes PSC)

        ## 🔧 Installation

        ### Linux/macOS
        \`\`\`bash
        # Download for your platform
        wget https://github.com/perigrin/pvm/releases/download/$TAG/pvm-${VERSION}-linux-amd64.tar.gz
        tar -xzf pvm-${VERSION}-linux-amd64.tar.gz

        # Make binaries executable and test
        chmod +x pvm-* pvi-* pvx-*
        ./pvm-linux-amd64 version
        \`\`\`

        ## 🧪 Components

        | Component | Description | Platforms |
        |-----------|-------------|-----------|
        | **pvm** | Main Perl version manager | Linux, macOS |
        | **pvi** | Package installer with dependency management | Linux, macOS |
        | **pvx** | Perl script executor with isolation | Linux, macOS |
        | **psc** | Perl script compiler with type checking | Linux, macOS |

        ## ⚠️ Notes

        - **PSC** (Perl Script Compiler) requires tree-sitter and is not available on Linux ARM64 in this release
        - **Windows support** is temporarily disabled - see GitHub issues for status
        - Some advanced features require additional Perl modules to be installed
        - $(if [[ "${{ steps.version.outputs.prerelease }}" == "true" ]]; then echo "This is a pre-release build - not recommended for production use"; else echo "This is a stable release suitable for production use"; fi)

        ## 📋 Support

        - **Documentation**: See the [README](https://github.com/perigrin/pvm/blob/main/README.md)
        - **Issues**: Report bugs and feature requests via [GitHub Issues](https://github.com/perigrin/pvm/issues)
        - **Discussions**: Join the conversation in [GitHub Discussions](https://github.com/perigrin/pvm/discussions)
        EOF

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: PVM ${{ steps.version.outputs.tag }}
        body_path: release_notes.md
        files: release-files/*
        prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
        generate_release_notes: false
        make_latest: ${{ steps.version.outputs.prerelease == 'false' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Update release summary
      run: |
        echo "## 🎉 Release Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Tag**: ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
        echo "**Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "**Pre-release**: ${{ steps.version.outputs.prerelease }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📦 Release Assets" >> $GITHUB_STEP_SUMMARY
        ls -la release-files/ >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🔗 Links" >> $GITHUB_STEP_SUMMARY
        echo "- [Release Page](https://github.com/perigrin/pvm/releases/tag/${{ steps.version.outputs.tag }})" >> $GITHUB_STEP_SUMMARY
        echo "- [All Releases](https://github.com/perigrin/pvm/releases)" >> $GITHUB_STEP_SUMMARY
