name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string
      bump_type:
        description: 'Type of version bump'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

jobs:
  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      tag_name: ${{ steps.bump.outputs.tag_name }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Set up Git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

    - name: Calculate new version
      id: bump
      run: |
        # Get current version from version.go
        current_version=$(grep 'const Version' internal/version/version.go | sed 's/.*"\(.*\)".*/\1/')
        echo "Current version: $current_version"

        if [ "${{ github.event.inputs.version }}" != "" ]; then
          new_version="${{ github.event.inputs.version }}"
        else
          # Parse current version
          IFS='.' read -ra VERSION_PARTS <<< "$current_version"
          major=${VERSION_PARTS[0]}
          minor=${VERSION_PARTS[1]}
          patch=${VERSION_PARTS[2]}

          # Bump version based on type
          case "${{ github.event.inputs.bump_type }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          new_version="$major.$minor.$patch"
        fi

        echo "New version: $new_version"
        echo "new_version=$new_version" >> $GITHUB_OUTPUT
        echo "tag_name=v$new_version" >> $GITHUB_OUTPUT

    - name: Update version in code
      run: |
        # Update internal/version/version.go
        sed -i "s/const Version = \".*\"/const Version = \"${{ steps.bump.outputs.new_version }}\"/" internal/version/version.go

        # Verify the change
        grep "const Version" internal/version/version.go

    - name: Commit and push version bump
      run: |
        git add internal/version/version.go
        git commit -m "RELEASE: Bump version to ${{ steps.bump.outputs.new_version }}"
        git push origin HEAD

    - name: Create and push tag
      run: |
        git tag "${{ steps.bump.outputs.tag_name }}"
        git push origin "${{ steps.bump.outputs.tag_name }}"

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [bump-version]
    if: always() && (needs.bump-version.result == 'success' || github.event_name == 'push')
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_id: ${{ steps.create_release.outputs.id }}
      tag_name: ${{ steps.get_tag.outputs.tag_name }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Get tag name
      id: get_tag
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "tag_name=${{ needs.bump-version.outputs.tag_name }}" >> $GITHUB_OUTPUT
        else
          echo "tag_name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
        fi

    - name: Generate release notes
      id: release_notes
      run: |
        # Get the previous tag
        prev_tag=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")

        if [ -n "$prev_tag" ]; then
          echo "## Changes since $prev_tag" > release_notes.md
          echo "" >> release_notes.md
          git log --pretty=format:"- %s (%h)" $prev_tag..HEAD >> release_notes.md
        else
          echo "## Initial Release" > release_notes.md
          echo "" >> release_notes.md
          echo "This is the first release of PVM (Perl Version Manager) with PSC (Perl Static Checker)." >> release_notes.md
        fi

        echo "" >> release_notes.md
        echo "## Components Included" >> release_notes.md
        echo "- **pvm**: Perl Version Manager" >> release_notes.md
        echo "- **pvx**: Perl Version Executor" >> release_notes.md
        echo "- **pvi**: Perl Version Installer" >> release_notes.md
        echo "- **psc**: Perl Static Checker" >> release_notes.md

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.get_tag.outputs.tag_name }}
        release_name: PVM ${{ steps.get_tag.outputs.tag_name }}
        body_path: release_notes.md
        draft: false
        prerelease: false

  build-and-upload:
    name: Build and Upload Assets
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux builds
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            cc: gcc
            archive_type: "tar.gz"
            artifact_name: "linux-amd64"
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            cc: aarch64-linux-gnu-gcc
            archive_type: "tar.gz"
            artifact_name: "linux-arm64"

          # macOS builds
          - os: macos-latest
            goos: darwin
            goarch: amd64
            cc: clang
            archive_type: "tar.gz"
            artifact_name: "darwin-amd64"
          - os: macos-latest
            goos: darwin
            goarch: arm64
            cc: clang
            archive_type: "tar.gz"
            artifact_name: "darwin-arm64"

          # Windows builds
          - os: windows-latest
            goos: windows
            goarch: amd64
            cc: gcc
            archive_type: "zip"
            artifact_name: "windows-amd64"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install tree-sitter CLI
      run: npm install -g tree-sitter-cli@latest

    - name: Install system dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential
        if [ "${{ matrix.goarch }}" == "arm64" ]; then
          sudo apt-get install -y gcc-aarch64-linux-gnu
        fi

    - name: Install system dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        # Ensure Xcode command line tools are available
        xcode-select --install 2>/dev/null || true

    - name: Install system dependencies (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        choco install msys2 -y
        refreshenv

    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: |
        go mod download
        go mod vendor

    - name: Build tree-sitter parser
      run: make tree-sitter
      shell: bash

    - name: Set build environment
      run: |
        echo "CGO_ENABLED=1" >> $GITHUB_ENV
        echo "GOOS=${{ matrix.goos }}" >> $GITHUB_ENV
        echo "GOARCH=${{ matrix.goarch }}" >> $GITHUB_ENV
      shell: bash

    - name: Set cross-compilation environment (Linux ARM64)
      if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
      run: |
        echo "CC=${{ matrix.cc }}" >> $GITHUB_ENV

    - name: Set build flags
      run: |
        VERSION="${{ needs.create-release.outputs.tag_name }}"
        BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        COMMIT_HASH=$(git rev-parse --short HEAD)

        LDFLAGS="-s -w"
        LDFLAGS="$LDFLAGS -X 'tamarou.com/pvm/internal/version.Version=${VERSION#v}'"
        LDFLAGS="$LDFLAGS -X 'tamarou.com/pvm/internal/version.BuildTime=$BUILD_TIME'"
        LDFLAGS="$LDFLAGS -X 'tamarou.com/pvm/internal/version.CommitHash=$COMMIT_HASH'"

        echo "LDFLAGS=$LDFLAGS" >> $GITHUB_ENV
      shell: bash

    - name: Build binaries
      run: |
        mkdir -p release

        # Get the extension for Windows
        EXT=""
        if [ "${{ matrix.goos }}" == "windows" ]; then
          EXT=".exe"
        fi

        echo "Building PVM components..."

        # Build core components (these should always work)
        go build -ldflags="$LDFLAGS" -o "release/pvm$EXT" ./cmd/pvm
        go build -ldflags="$LDFLAGS" -o "release/pvx$EXT" ./cmd/pvx
        go build -ldflags="$LDFLAGS" -o "release/pvi$EXT" ./cmd/pvi

        # Build PSC (may fail on cross-compilation due to CGO)
        echo "Building PSC..."
        if go build -ldflags="$LDFLAGS" -o "release/psc$EXT" ./cmd/psc 2>/dev/null; then
          echo "PSC build successful"
        else
          echo "PSC build failed - this is expected for some cross-compilation targets"
          echo "PSC requires tree-sitter CGO integration which may not work on all platforms"
        fi

        # Copy documentation
        cp README.md release/ 2>/dev/null || true
        cp LICENSE release/ 2>/dev/null || true

        # Create a build info file
        echo "PVM Release Build Information" > release/BUILD_INFO.txt
        echo "=============================" >> release/BUILD_INFO.txt
        echo "Version: ${{ needs.create-release.outputs.tag_name }}" >> release/BUILD_INFO.txt
        echo "Platform: ${{ matrix.goos }}-${{ matrix.goarch }}" >> release/BUILD_INFO.txt
        echo "Build Time: $(date -u)" >> release/BUILD_INFO.txt
        echo "Commit: $(git rev-parse --short HEAD)" >> release/BUILD_INFO.txt
        echo "" >> release/BUILD_INFO.txt
        echo "Components:" >> release/BUILD_INFO.txt
        echo "- pvm: Perl Version Manager" >> release/BUILD_INFO.txt
        echo "- pvx: Perl Version Executor" >> release/BUILD_INFO.txt
        echo "- pvi: Perl Version Installer" >> release/BUILD_INFO.txt
        echo "- psc: Perl Static Checker (if included)" >> release/BUILD_INFO.txt
        echo "" >> release/BUILD_INFO.txt
        echo "For more information, visit: https://github.com/perigrin/pvm" >> release/BUILD_INFO.txt

        # List what we built
        echo "Built files:"
        ls -la release/
      shell: bash

    - name: Run basic tests
      run: |
        # Test that binaries can execute and show version
        echo "Testing built binaries..."

        EXT=""
        if [ "${{ matrix.goos }}" == "windows" ]; then
          EXT=".exe"
        fi

        # Test core components
        ./release/pvm$EXT --version || echo "pvm version test failed"
        ./release/pvx$EXT --version || echo "pvx version test failed"
        ./release/pvi$EXT --version || echo "pvi version test failed"

        # Test PSC if it exists
        if [ -f "./release/psc$EXT" ]; then
          ./release/psc$EXT --version || echo "psc version test failed"
        fi
      shell: bash

    - name: Create archive (Unix)
      if: matrix.archive_type == 'tar.gz'
      run: |
        cd release
        tar -czf "../pvm-${{ needs.create-release.outputs.tag_name }}-${{ matrix.artifact_name }}.tar.gz" *
        cd ..

    - name: Create archive (Windows)
      if: matrix.archive_type == 'zip'
      run: |
        cd release
        if command -v 7z &> /dev/null; then
          7z a "../pvm-${{ needs.create-release.outputs.tag_name }}-${{ matrix.artifact_name }}.zip" *
        else
          powershell Compress-Archive -Path * -DestinationPath "../pvm-${{ needs.create-release.outputs.tag_name }}-${{ matrix.artifact_name }}.zip"
        fi
        cd ..
      shell: bash

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./pvm-${{ needs.create-release.outputs.tag_name }}-${{ matrix.artifact_name }}.${{ matrix.archive_type }}
        asset_name: pvm-${{ needs.create-release.outputs.tag_name }}-${{ matrix.artifact_name }}.${{ matrix.archive_type }}
        asset_content_type: ${{ matrix.archive_type == 'zip' && 'application/zip' || 'application/gzip' }}

  update-latest:
    name: Update Latest Release Info
    needs: [create-release, build-and-upload]
    runs-on: ubuntu-latest
    if: always() && needs.create-release.result == 'success'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Update installation script
      run: |
        # Create or update an installation script that uses the latest release
        mkdir -p scripts
        echo '#!/bin/bash' > scripts/install.sh
        echo '# PVM Installation Script' >> scripts/install.sh
        echo '# Downloads and installs the latest PVM release' >> scripts/install.sh
        echo '' >> scripts/install.sh
        echo 'set -e' >> scripts/install.sh
        echo '' >> scripts/install.sh
        echo '# Detect OS and architecture' >> scripts/install.sh
        echo 'OS="$(uname -s)"' >> scripts/install.sh
        echo 'ARCH="$(uname -m)"' >> scripts/install.sh
        echo '' >> scripts/install.sh
        echo 'case $OS in' >> scripts/install.sh
        echo '  Linux*)' >> scripts/install.sh
        echo '    OS_NAME="linux"' >> scripts/install.sh
        echo '    ;;' >> scripts/install.sh
        echo '  Darwin*)' >> scripts/install.sh
        echo '    OS_NAME="darwin"' >> scripts/install.sh
        echo '    ;;' >> scripts/install.sh
        echo '  CYGWIN*|MINGW*|MSYS*)' >> scripts/install.sh
        echo '    OS_NAME="windows"' >> scripts/install.sh
        echo '    ;;' >> scripts/install.sh
        echo '  *)' >> scripts/install.sh
        echo '    echo "Unsupported operating system: $OS"' >> scripts/install.sh
        echo '    exit 1' >> scripts/install.sh
        echo '    ;;' >> scripts/install.sh
        echo 'esac' >> scripts/install.sh
        echo '' >> scripts/install.sh
        echo 'echo "Installing PVM for $OS_NAME..."' >> scripts/install.sh
        echo 'echo "Installation script created. Manual implementation needed."' >> scripts/install.sh

        chmod +x scripts/install.sh

    - name: Commit installation script
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add scripts/install.sh
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "UPDATE: Installation script for release ${{ needs.create-release.outputs.tag_name }}"
          git push
        fi
