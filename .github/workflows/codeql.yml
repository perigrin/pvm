# ABOUTME: CodeQL security analysis workflow for static code security scanning
# ABOUTME: Provides advanced security analysis and vulnerability detection for Go code

name: "CodeQL Security Analysis"

on:
  push:
    branches: [ main, pu, develop ]
  pull_request:
    branches: [ main, pu ]
  schedule:
    - cron: '0 4 * * 1'  # Weekly on Monday at 4 AM UTC

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      # required for all workflows
      security-events: write
      # required to fetch internal or private CodeQL packs
      packages: read
      # only required for workflows in private repositories
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: go
          build-mode: autobuild

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v2
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        # Custom queries for Go security analysis
        queries: security-extended,security-and-quality

    - name: Set up Go (for build dependencies)
      if: matrix.build-mode == 'manual'
      uses: actions/setup-go@v4
      with:
        go-version: '1.24.1'

    - name: Set up Node.js (for tree-sitter)
      if: matrix.build-mode == 'manual'
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install tree-sitter CLI
      if: matrix.build-mode == 'manual'
      run: npm install -g tree-sitter-cli

    - name: Install system dependencies
      if: matrix.build-mode == 'manual'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential

    - name: Manual build
      if: matrix.build-mode == 'manual'
      run: |
        make tree-sitter
        make pvm
        make pvx
        make pvi
        make psc

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2
      with:
        category: "/language:${{matrix.language}}"
        upload: true
