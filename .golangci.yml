run:
  timeout: 10m
  go: "1.24"

linters:
  enable:
    - gofmt
    - goimports
    - govet
    - staticcheck
    - unused
    - misspell
    - ineffassign
    - deadcode
  disable:
    - errcheck  # Too many unchecked errors in current codebase

linters-settings:
  staticcheck:
    checks: ["all", "-SA9003"]  # Disable empty branch warnings

issues:
  exclude-rules:
    # Disable errcheck for test files
    - path: _test\.go
      linters:
        - errcheck
    # Disable errcheck for main functions
    - path: cmd/
      linters:
        - errcheck
  max-issues-per-linter: 0
  max-same-issues: 0