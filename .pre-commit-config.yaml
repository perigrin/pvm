repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.3.0
    hooks:
      - id: trailing-whitespace
        exclude: ^vendor/
      - id: end-of-file-fixer
        exclude: ^vendor/
      - id: check-yaml
      - id: check-added-large-files
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.0
    hooks:
      - id: go-fmt
        exclude: ^vendor/
      - id: go-imports
        exclude: ^vendor/
      - id: no-go-testing
        exclude: ^(vendor/.*|internal/parser/test_framework.*\.go|test_infrastructure_validation\.go|internal/parser/markdown_test_loader_test\.go)$
      # golangci-lint and go-unit-tests disabled due to tree-sitter C dependencies
      # Use 'make test' and 'make' for complete validation
      - id: go-critic
        exclude: ^(vendor/.*|internal/parser/.*\.go|internal/psc/.*\.go|internal/typechecker/.*\.go|cmd/psc/.*\.go)$
      # - id: validate-toml
  - repo: local
    hooks:
      - id: makefile-build
        name: 'Makefile build'
        description: "Build using Makefile to ensure tree-sitter dependencies"
        entry: make
        language: system
        pass_filenames: false
        files: '\.go$'
      # makefile-test-fast disabled - use 'make test' for comprehensive testing
      - id: go-vet-custom
        name: 'go vet custom'
        description: "Runs go vet on the entire module (excluding tree-sitter)"
        entry: .github/hooks/run-go-vet.sh
        language: script
        pass_filenames: false
        files: '\.go$'
        exclude: ^(internal/parser/.*\.go|internal/psc/.*\.go|internal/typechecker/.*\.go|cmd/psc/.*\.go)$
      # gosec-security-scan temporarily disabled due to timeout issues
      # - id: gosec-security-scan
      #   name: 'gosec security scan'
      #   description: "Runs gosec security scanner on Go code"
      #   entry: .github/hooks/run-gosec.sh
      #   language: script
      #   pass_filenames: false
      #   files: '\.go$'
      - id: staticcheck-linting
        name: 'staticcheck linting'
        description: "Runs staticcheck static analysis on Go code"
        entry: .github/hooks/run-staticcheck.sh
        language: script
        pass_filenames: false
        files: '\.go$'
      - id: govulncheck
        name: 'vulnerability scan'
        description: "Runs govulncheck for Go vulnerabilities"
        entry: govulncheck
        args: ['./...']
        language: system
        pass_filenames: false
        files: '(go\.mod|go\.sum|\.go)$'
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v8.0.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']
