repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.3.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.0
    hooks:
      - id: go-fmt
      - id: go-imports
      - id: no-go-testing
      # Temporarily disabled due to tree-sitter CGO dependencies
      # - id: golangci-lint
      # - id: go-critic
      # - id: go-unit-tests
      # - id: go-build
      # - id: validate-toml
  # - repo: local
  #   hooks:
  #     - id: go-vet-custom
  #       name: 'go vet custom'
  #       description: "Runs go vet on the entire module"
  #       entry: .github/hooks/run-go-vet.sh
  #       language: script
  #       pass_filenames: false
  #       files: '\.go$'
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v8.0.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']
